<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
<div class="min-h-screen bg-[#050505] text-white font-sans selection:bg-blue-500/30">
  
  <header class="flex items-center justify-between px-6 py-6 max-w-7xl mx-auto">
    <img src="../image_munis/Logo (1).png" alt="">

    <nav class="hidden md:flex items-center gap-8 text-sm text-gray-400 font-medium">
      <a href="#" class="hover:text-white transition">Home</a>
      <a href="#" class="hover:text-white transition">Services</a>
      <a href="#" class="hover:text-white transition">Portfolio</a>
      <a href="#" class="hover:text-white transition">About Us</a>
      <a href="#" class="hover:text-white transition">Careers</a>
    </nav>

    <button class="bg-[#007BFF] hover:bg-blue-600 px-5 py-2 rounded-lg text-sm font-semibold transition-all shadow-lg shadow-blue-500/20">
      Contact Us
    </button>
  </header>

  <main class="px-4 py-10">
    <div class="max-w-6xl mx-auto bg-[#111111] border border-white/5 rounded-[40px] overflow-hidden relative group">
      
      <div class="absolute inset-0 opacity-10 pointer-events-none" 
           style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 40px 40px;">
      </div>

      <div class="flex flex-col md:flex-row items-center p-10 md:p-20 relative z-10">
        
        <div class="w-full md:w-3/5 text-center md:text-left space-y-6">
          <h1 class="text-4xl md:text-6xl font-bold leading-tight tracking-tight">
            Build the Future with Us
          </h1>
          <p class="text-gray-400 text-lg md:text-xl max-w-lg mx-auto md:mx-0 leading-relaxed">
            We're a team of builders, thinkers, and explorers using AI, machine learning, and blockchain to solve meaningful problems.
          </p>
          <div class="pt-4">
            <button class="bg-[#007BFF] hover:bg-blue-600 px-8 py-4 rounded-xl font-bold text-base transition-transform active:scale-95 shadow-xl shadow-blue-500/10">
              Explore Open Positions
            </button>
          </div>
        </div>

        <div class="w-full md:w-2/5 mt-12 md:mt-0 flex justify-center">
          <img src="../image_munis/calogo1 2.png" 
               alt="3D Briefcase" 
               class="w-64 md:w-full max-w-sm object-contain drop-shadow-[0_20px_50px_rgba(0,123,255,0.2)] transform group-hover:scale-105 transition-duration-700">
        </div>

      </div>
    </div>
  </main>
</div>

</body>
</html>
