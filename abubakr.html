<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers | Catalyst Analytics</title>
    <link rel="stylesheet" href="./src/output.css">
</head>

<body class="bg-black text-white [font-family:'Segoe_UI',Tahoma,sans-serif]">
    <div class="mx-auto min-h-screen w-full max-w-[1240px] px-4 pb-16 pt-4 sm:px-5 lg:px-6">
        <header class="flex items-center justify-between gap-5 border-b border-white/[0.06] pb-4">
            <a href="#hero" aria-label="Catalyst Analytics home">
                <img class="w-[118px] sm:w-[126px]" src="./abubakrimage/Logo.svg" alt="Catalyst Analytics logo">
            </a>

            <nav class="hidden items-center gap-5 text-[11px] text-white/65 md:flex lg:gap-6" aria-label="Primary">
                <a class="transition hover:text-white" href="#hero">Home</a>
                <a class="transition hover:text-white" href="#hero">Services</a>
                <a class="transition hover:text-white" href="#hero">Portfolio</a>
                <a class="transition hover:text-white" href="#hero">About Us</a>
                <a class="transition hover:text-white" href="#hero">Careers</a>
            </nav>

            <a class="inline-flex h-8 items-center justify-center rounded-[8px] bg-[#0A84FF] px-4 text-[11px] font-medium text-white transition hover:bg-[#0c76df] sm:h-9 sm:px-5" href="#hero">
                Contact us
            </a>
        </header>

        <main>
            <section class="pt-6" id="hero">
                <div class="overflow-hidden rounded-[24px] border border-white/[0.08] bg-[#111111] bg-[linear-gradient(90deg,rgba(8,8,8,0.72)_0%,rgba(8,8,8,0.34)_46%,rgba(8,8,8,0.10)_100%),url('../abubakrimage/hero.jpg')] bg-cover bg-center bg-no-repeat px-5 py-8 sm:px-7 sm:py-10 lg:min-h-[288px] lg:px-9 lg:py-11">
                    <div class="max-w-[360px] pt-1">
                        <h1 class="text-[26px] leading-[1.15] font-semibold tracking-[-0.03em] text-white sm:text-[32px] lg:text-[38px]">
                            Build the Future with Us
                        </h1>

                        <p class="mt-3 max-w-[320px] text-[11px] leading-5 text-white/55 sm:text-[12px] sm:leading-[1.7]">
                            Discover exciting career opportunities at Catalyst Analytics and join us in creating digital
                            products that move businesses forward.
                        </p>

                        <a class="mt-5 inline-flex h-9 items-center justify-center rounded-[7px] bg-[#0A84FF] px-4 text-[11px] font-medium text-white transition hover:bg-[#0c76df] sm:h-10 sm:px-5" href="#positions">
                            Explore Opportunities
                        </a>
                    </div>
                </div>

                <div class="mt-5 flex flex-col gap-3 rounded-[18px] bg-[#0A0A0A] p-3 sm:p-4 xl:flex-row xl:items-start">
                    <details class="group rounded-[12px] border border-white/[0.06] bg-[#121212] xl:w-[170px] [&_summary::-webkit-details-marker]:hidden">
                        <summary class="flex h-11 cursor-pointer list-none items-center justify-between px-4 text-left text-[11px] text-white/72">
                            <span>Categories</span>
                            <span class="text-white/45 transition group-open:rotate-180">
                                <svg class="h-4 w-4" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                                    <path d="M5 8L10 13L15 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </span>
                        </summary>
                        <div class="space-y-2 border-t border-white/[0.06] px-3 py-3">
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="category" checked>
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">All categories</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="category">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Design</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="category">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Development</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="category">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Marketing</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="category">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Management</span>
                            </label>
                        </div>
                    </details>

                    <details class="group rounded-[12px] border border-white/[0.06] bg-[#121212] xl:w-[170px] [&_summary::-webkit-details-marker]:hidden">
                        <summary class="flex h-11 cursor-pointer list-none items-center justify-between px-4 text-left text-[11px] text-white/72">
                            <span>Experience</span>
                            <span class="text-white/45 transition group-open:rotate-180">
                                <svg class="h-4 w-4" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                                    <path d="M5 8L10 13L15 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </span>
                        </summary>
                        <div class="space-y-2 border-t border-white/[0.06] px-3 py-3">
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="experience" checked>
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Any level</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="experience">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Entry Level</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="experience">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">1-3 Years</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="experience">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">3-5 Years</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="experience">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Senior Level</span>
                            </label>
                        </div>
                    </details>

                    <details class="group rounded-[12px] border border-white/[0.06] bg-[#121212] xl:w-[170px] [&_summary::-webkit-details-marker]:hidden">
                        <summary class="flex h-11 cursor-pointer list-none items-center justify-between px-4 text-left text-[11px] text-white/72">
                            <span>Job type</span>
                            <span class="text-white/45 transition group-open:rotate-180">
                                <svg class="h-4 w-4" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                                    <path d="M5 8L10 13L15 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </span>
                        </summary>
                        <div class="space-y-2 border-t border-white/[0.06] px-3 py-3">
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="job-type" checked>
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">All types</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="job-type">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Full Time</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="job-type">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Part Time</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="job-type">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Contract</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="job-type">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Internship</span>
                            </label>
                        </div>
                    </details>

                    <details class="group rounded-[12px] border border-white/[0.06] bg-[#121212] xl:w-[170px] [&_summary::-webkit-details-marker]:hidden">
                        <summary class="flex h-11 cursor-pointer list-none items-center justify-between px-4 text-left text-[11px] text-white/72">
                            <span>Workplace type</span>
                            <span class="text-white/45 transition group-open:rotate-180">
                                <svg class="h-4 w-4" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                                    <path d="M5 8L10 13L15 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </span>
                        </summary>
                        <div class="space-y-2 border-t border-white/[0.06] px-3 py-3">
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="workplace" checked>
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Anywhere</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="workplace">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Remote</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="workplace">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Hybrid</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="workplace">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">On-site</span>
                            </label>
                            <label class="block cursor-pointer">
                                <input class="peer sr-only" type="radio" name="workplace">
                                <span class="flex h-8 items-center rounded-[8px] px-3 text-[11px] text-white/60 transition peer-checked:bg-[#0A84FF] peer-checked:text-white">Flexible</span>
                            </label>
                        </div>
                    </details>

                    <div class="flex h-11 min-w-0 items-center rounded-[12px] border border-white/[0.06] bg-[#121212] pl-4 pr-1 xl:flex-1">
                        <input class="h-full min-w-0 flex-1 bg-transparent text-[11px] text-white outline-none placeholder:text-white/30" type="text" placeholder="Search by Position..." aria-label="Search by position">
                        <button class="inline-flex h-9 w-9 items-center justify-center rounded-full bg-[#0A84FF]" type="button" aria-label="Search">
                            <img class="h-[18px] w-[18px]" src="./abubakrimage/search.svg" alt="">
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
